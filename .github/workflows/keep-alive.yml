name: Keep Backend Alive

on:
  schedule:
    - cron: '*/14 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake up Render backend
        run: |
          echo "Pinging backend at $(date)"
          curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" \
            https://nexusedu-backend-0bjq.onrender.com/api/health \
            --max-time 60 \
            || echo "Backend was sleeping - woke it up"
          echo "Done"
