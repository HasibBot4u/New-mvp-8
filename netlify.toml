[build]
  command = "npm run build"
  publish = "dist"
  
[build.environment]
  NODE_VERSION = "20"
  VITE_API_BASE_URL = "https://nexusedu-backend-0bjq.onrender.com"
  VITE_SUPABASE_URL = ""      # Set this in Netlify dashboard — NOT here
  VITE_SUPABASE_ANON_KEY = "" # Set this in Netlify dashboard — NOT here
  VITE_ADMIN_TOKEN = ""       # Set this in Netlify dashboard — NOT here

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
    [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    X-XSS-Protection = "1; mode=block"
    Content-Security-Policy = "default-src 'self' https://*.supabase.co https://fonts.googleapis.com https://fonts.gstatic.com; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; img-src 'self' data: https:; media-src *; connect-src 'self' https://*.supabase.co https://*.onrender.com https://*.replit.dev;"

[[headers]]
  for = "/api/*"
    [headers.values]
    Cache-Control = "no-cache, no-store"
